<script>
    const button=document.getElementById("toggle-checklist")
    const checklist=document.querySelector(".right-panel")
    button.addEventListener("click",function(){  
       if(checklist.style.display==="none"){         //in the checklist go to style and change the display
       checklist.style.display="block";         
       }
    else{
        checklist.style.display="none"
    }
    
       

});
</script>
